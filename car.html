<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<!-- SEO tags filled dynamically by JS -->
<title>טוען...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap">

<style>
/* ════ RESET ════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a; --ink:#1a1a1a; --dark:#222; --mid:#555; --muted:#6f6f6f;
  --border:#e8e8e8; --bg:#f7f7f5; --white:#fff; --red:#e8001d;
  --font:'Rubik',sans-serif; --radius:8px; --max:1100px;
  --shadow:0 2px 14px rgba(0,0,0,0.08);
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
button{font-family:var(--font);cursor:pointer;border:none;background:none}

/* ════ HEADER ════ */
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(0,0,0,0.04)}
.header-inner{max-width:var(--max);margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{display:flex;flex-direction:column;gap:1px;text-decoration:none}
.logo-name{font-size:1.8rem;font-weight:900;letter-spacing:-0.04em;line-height:1;color:var(--black)}
.logo-name span{color:var(--red)}
.logo-sub{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.header-breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--muted);flex-wrap:wrap}
.header-breadcrumb a{color:var(--muted);transition:color 0.2s}
.header-breadcrumb a:hover{color:var(--red)}
.header-breadcrumb .sep{color:var(--border)}

/* ════ HERO ════ */
.car-hero{position:relative;background:#0a0a0a;overflow:hidden;max-height:520px}
.car-hero-img{width:100%;max-height:520px;object-fit:cover;display:block;opacity:0;transition:opacity 0.4s}
.car-hero-img.loaded{opacity:1}
.car-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 30%,rgba(0,0,0,0.82) 100%)}
.car-hero-content{position:absolute;bottom:0;right:0;left:0;padding:32px 32px 28px}
.car-hero-inner{max-width:var(--max);margin:0 auto}
.car-hero-cat{display:inline-block;background:rgba(232,0,29,0.9);color:#fff;font-size:0.65rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.car-hero-title{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;color:#fff;line-height:1.15;margin-bottom:8px;letter-spacing:-0.02em}
.car-hero-sub{font-size:0.9rem;color:rgba(255,255,255,0.7);max-width:560px;margin-bottom:18px}
.car-hero-stats{display:flex;gap:24px;flex-wrap:wrap}
.car-hero-stat{display:flex;flex-direction:column}
.car-hero-stat-val{font-size:1.25rem;font-weight:900;color:#fff;line-height:1}
.car-hero-stat-label{font-size:0.65rem;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.car-hero-cta{position:absolute;top:24px;left:24px;display:flex;flex-direction:column;gap:8px}
@media(max-width:600px){.car-hero-content{padding:20px 16px 20px}.car-hero-title{font-size:1.4rem}.car-hero-stats{gap:14px}.car-hero-cta{display:none}}

/* ════ QUICK SPECS STRIP ════ */
.spec-strip-wrap{background:var(--white);border-bottom:1px solid var(--border)}
.spec-strip{max-width:var(--max);margin:0 auto;padding:0 24px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.spec-strip::-webkit-scrollbar{display:none}
.spec-strip-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:18px 20px;border-left:1px solid var(--border);flex-shrink:0;min-width:110px;text-align:center}
.spec-strip-item:last-child{border-left:none}
.spec-strip-icon{font-size:1.3rem;margin-bottom:2px}
.spec-strip-val{font-size:1rem;font-weight:800;color:var(--ink)}
.spec-strip-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}

/* ════ CONTENT LAYOUT ════ */
.car-content{max-width:var(--max);margin:0 auto;padding:32px 24px 80px;display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start}
@media(max-width:900px){.car-content{grid-template-columns:1fr;padding:20px 16px 80px}}

/* ════ MAIN COLUMN ════ */
.car-main{}

/* ════ TABS ════ */
.tabs-nav{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:24px;background:var(--white);border-radius:10px 10px 0 0;flex-shrink:0}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:14px 20px;font-size:0.85rem;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s;flex-shrink:0}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-pane{display:none;animation:fadeIn 0.2s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ════ OVERVIEW ════ */
.overview-text{font-size:0.95rem;line-height:1.8;color:var(--mid);margin-bottom:20px}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
@media(max-width:600px){.pros-cons{grid-template-columns:1fr}}
.pros-col,.cons-col{border-radius:10px;padding:16px}
.pros-col{background:#f0fdf4;border:1px solid #bbf7d0}
.cons-col{background:#fff1f1;border:1px solid #fecaca}
.pros-cons-title{font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pros-col .pros-cons-title{color:#16a34a}
.cons-col .pros-cons-title{color:#dc2626}
.pros-cons-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.pros-cons-list li{font-size:0.82rem;color:var(--dark);display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.pros-cons-list li::before{flex-shrink:0;margin-top:2px}
.pros-col .pros-cons-list li::before{content:'✓';color:#16a34a;font-weight:900}
.cons-col .pros-cons-list li::before{content:'✗';color:#dc2626;font-weight:900}

/* ════ SCORE CARDS ════ */
.score-section{margin-top:24px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:10px}
.score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.score-big{font-size:3rem;font-weight:900;line-height:1;color:var(--ink)}
.score-big span{font-size:1rem;font-weight:400;color:var(--muted)}
.score-label{font-size:0.75rem;color:var(--muted);margin-top:2px}
.score-cats{display:flex;flex-direction:column;gap:10px}
.score-row{display:grid;grid-template-columns:80px 1fr 36px;align-items:center;gap:12px}
.score-name{font-size:0.8rem;font-weight:600;color:var(--dark)}
.score-bar-wrap{background:var(--border);border-radius:4px;height:7px;overflow:hidden}
.score-bar{height:100%;border-radius:4px;transition:width 1s ease}
.score-num{font-size:0.8rem;font-weight:800;color:var(--ink);text-align:left}

/* ════ SPECS TABLE ════ */
.specs-group{margin-bottom:24px}
.specs-group-title{font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.specs-table{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.specs-table tr:nth-child(even) td{background:#fafaf9}
.specs-table td{padding:10px 14px;font-size:0.85rem;border-bottom:1px solid var(--border)}
.specs-table tr:last-child td{border-bottom:none}
.specs-table td:first-child{color:var(--muted);font-weight:600;width:50%}
.specs-table td:last-child{font-weight:700;color:var(--ink)}

/* ════ FEATURES GRID ════ */
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.feature-card{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--white);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;color:var(--dark);font-weight:500}
.feature-icon{font-size:1.2rem;flex-shrink:0}
.safety-feature-card{border-color:rgba(22,163,74,0.25);background:#f8fff9}
.safety-feature-card .feature-icon{font-size:1rem}

/* ════ GALLERY ════ */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:600px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
.gallery-item{aspect-ratio:16/9;overflow:hidden;border-radius:8px;cursor:pointer;position:relative}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.35s ease;display:block}
.gallery-item:hover img{transform:scale(1.05)}
.gallery-item-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 0.25s;display:flex;align-items:center;justify-content:center}
.gallery-item:hover .gallery-item-overlay{background:rgba(0,0,0,0.25)}
.gallery-zoom-icon{color:#fff;opacity:0;transition:opacity 0.25s;font-size:1.5rem}
.gallery-item:hover .gallery-zoom-icon{opacity:1}

/* ════ LIGHTBOX ════ */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:12px;touch-action:pan-y}
.lightbox.open{display:flex}
.lightbox-img-wrap{position:relative;max-width:90vw;max-height:80vh}
.lightbox-img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:8px;display:block}
.lightbox-close{position:fixed;top:20px;left:20px;width:40px;height:40px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:1.1rem;transition:background 0.2s}
.lightbox-close:hover{background:rgba(255,255,255,0.25)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:1.4rem;transition:background 0.2s}
.lightbox-nav:hover{background:rgba(255,255,255,0.25)}
.lightbox-prev{right:20px}
.lightbox-next{left:20px}
.lightbox-count{color:rgba(255,255,255,0.55);font-size:0.78rem}

/* ════ VIDEO ════ */
.video-embed-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;border-radius:10px;cursor:pointer;background:#000}
.video-thumbnail{width:100%;height:100%;object-fit:cover}
.video-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:rgba(232,0,29,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.video-play-btn:hover{background:var(--red);transform:translate(-50%,-50%) scale(1.1)}
.video-play-btn svg{margin-right:-3px}

/* ════ RELATED CARS ════ */
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:700px){.related-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.related-grid{grid-template-columns:1fr}}
.related-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);transition:all 0.2s;text-decoration:none;color:inherit;display:block}
.related-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.1);transform:translateY(-2px)}
.related-card-img{aspect-ratio:16/9;overflow:hidden}
.related-card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.35s}
.related-card:hover .related-card-img img{transform:scale(1.04)}
.related-card-body{padding:12px}
.related-card-brand{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--red);margin-bottom:2px}
.related-card-name{font-size:0.88rem;font-weight:800;margin-bottom:4px;color:var(--ink)}
.related-card-price{font-size:0.8rem;color:var(--muted)}

/* ════ SIDEBAR ════ */
.car-sidebar{}
.sidebar-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.sidebar-box-title{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:14px}
.sidebar-price{font-size:1.8rem;font-weight:900;color:var(--ink);margin-bottom:4px}
.sidebar-price-note{font-size:0.72rem;color:var(--muted);margin-bottom:18px}
.btn-primary{display:block;width:100%;padding:12px 16px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;text-decoration:none;margin-bottom:8px}
.btn-primary:hover{background:#c0001a;transform:translateY(-1px)}
.btn-secondary{display:block;width:100%;padding:11px 16px;background:none;color:var(--dark);border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;text-decoration:none;margin-bottom:8px}
.btn-secondary:hover{border-color:var(--ink)}
.share-btn-row{display:flex;gap:8px}
.share-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.75rem;font-weight:600;color:var(--mid);transition:all 0.2s;cursor:pointer;text-decoration:none}
.share-btn:hover{border-color:var(--ink);color:var(--ink)}
.key-specs-list{display:flex;flex-direction:column;gap:10px}
.key-spec-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.key-spec-row:last-child{border-bottom:none}
.key-spec-label{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.key-spec-label svg{opacity:0.5}
.key-spec-val{font-size:0.85rem;font-weight:700;color:var(--ink)}
.colors-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-chip{padding:4px 10px;border:1.5px solid var(--border);border-radius:20px;font-size:0.72rem;color:var(--mid);cursor:default;white-space:nowrap}

/* ════ STICKY BOTTOM (mobile) ════ */
.sticky-bottom{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 16px;z-index:90;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,0.1)}
@media(max-width:768px){.sticky-bottom{display:flex}}
.sticky-bottom .btn-primary{margin:0;flex:1;padding:13px 10px;font-size:0.9rem}
.sticky-bottom .btn-secondary{margin:0;flex:1;padding:12px 10px;font-size:0.88rem}

/* ════ SECTION HEADING ════ */
.section-heading{font-size:0.85rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-heading::after{content:'';flex:1;height:1px;background:var(--border)}

/* ════ FOOTER ════ */
footer{background:var(--black);color:rgba(255,255,255,0.45);text-align:center;padding:20px 24px;font-size:0.75rem}
footer a{color:var(--red)}

/* ════ LOADING STATE ════ */
.car-page-loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:16px;color:var(--muted)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:60px 20px;color:var(--muted)}
.error-state h2{font-size:1.2rem;font-weight:800;margin-bottom:8px;color:var(--dark)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo" aria-label="ספידומטר - עמוד הבית">
      <span class="logo-name">ספידו<span>מטר</span></span>
      <span class="logo-sub">רכב · טכנולוגיה · חדשנות</span>
    </a>
    <nav class="header-breadcrumb" id="breadcrumb" aria-label="נתיב ניווט">
      <a href="/">בית</a>
      <span class="sep">›</span>
      <a href="cars-list.html">מאגר רכבים</a>
      <span class="sep">›</span>
      <span id="breadcrumb-name">טוען...</span>
    </nav>
  </div>
</header>

<!-- Dynamic content injected here -->
<div id="car-page-root">
  <div class="car-page-loading">
    <div class="loading-spinner"></div>
    <span>טוען מידע על הרכב...</span>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-label="תמונה מוגדלת">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="סגור">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)" aria-label="תמונה הקודמת">›</button>
  <div class="lightbox-img-wrap">
    <img class="lightbox-img" id="lightbox-img" src="" alt="תמונת רכב מוגדלת">
  </div>
  <div class="lightbox-count" id="lightbox-count"></div>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)" aria-label="תמונה הבאה">‹</button>
</div>

<!-- Sticky mobile bar (filled by JS) -->
<div class="sticky-bottom" id="sticky-bottom" style="display:none">
  <a href="#price-section" class="btn-primary">💰 מחיר</a>
  <button class="btn-secondary" onclick="shareCar()">שתף</button>
</div>

<footer>
  <p>© 2025 <a href="/">ספידומטר</a> | כל הזכויות שמורות</p>
</footer>

<script>
/* ══════════════════════════════
   ספידומטר — דף רכב v1
══════════════════════════════ */

let carData = null;
let galleryImages = [];
let lightboxIndex = 0;

// ── Load car data ──
async function loadCar() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('id');
  if (!slug) { showError('לא סופק מזהה רכב'); return; }

  try {
    let cars;
    try {
      const res = await fetch('data/cars.json');
      if (!res.ok) throw new Error('404');
      cars = await res.json();
    } catch(e) {
      cars = FALLBACK_CARS;
    }
    carData = cars.find(c => c.slug === slug || c.id === slug);
    if (!carData) { showError('הרכב לא נמצא: ' + slug); return; }
    renderPage();
  } catch(e) {
    showError('שגיאה בטעינת הנתונים');
    console.error(e);
  }
}

function showError(msg) {
  document.getElementById('car-page-root').innerHTML = `
    <div class="error-state">
      <h2>שגיאה</h2>
      <p>${msg}</p>
      <a href="cars-list.html" style="color:var(--red);font-weight:700;display:inline-block;margin-top:16px;">← חזרה למאגר הרכבים</a>
    </div>`;
}

function formatPrice(p) {
  return '₪' + Number(p).toLocaleString('he-IL');
}

// ── Render full page ──
function renderPage() {
  const c = carData;
  galleryImages = c.gallery_images || [];
  const isEV = !c.fuel_consumption;

  // ── SEO ──
  document.title = c.meta_title || `${c.brand} ${c.model} ${c.year} | ספידומטר`;
  document.querySelector('meta[name=description]')?.setAttribute('content', c.meta_description || c.description);

  // Update canonical
  let canon = document.querySelector('link[rel=canonical]');
  if (!canon) { canon = document.createElement('link'); canon.rel='canonical'; document.head.appendChild(canon); }
  canon.href = location.origin + location.pathname + '?id=' + c.slug;

  // JSON-LD
  const ld = {
    "@context": "https://schema.org", "@type": "Car",
    "name": `${c.brand} ${c.model} ${c.year}`,
    "brand": {"@type":"Brand","name":c.brand},
    "modelDate": String(c.year),
    "description": c.description,
    "offers": {"@type":"Offer","price":c.price,"priceCurrency":"ILS"}
  };
  let ldScript = document.getElementById('json-ld');
  if (!ldScript) { ldScript=document.createElement('script'); ldScript.id='json-ld'; ldScript.type='application/ld+json'; document.head.appendChild(ldScript); }
  ldScript.textContent = JSON.stringify(ld);

  // Breadcrumb

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active'); btn.setAttribute('aria-selected','true');
  document.getElementById('tab-'+name)?.classList.add('active');
}

// ── Lightbox ──
function openLightbox(index) {
  lightboxIndex = index;
  document.getElementById('lightbox-img').src = galleryImages[index];
  document.getElementById('lightbox-count').textContent = `${index+1} / ${galleryImages.length}`;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + galleryImages.length) % galleryImages.length;
  document.getElementById('lightbox-img').src = galleryImages[lightboxIndex];
  document.getElementById('lightbox-count').textContent = `${lightboxIndex+1} / ${galleryImages.length}`;
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='Escape') closeLightbox();
  if (e.key==='ArrowRight') lightboxNav(-1);
  if (e.key==='ArrowLeft') lightboxNav(1);
});

// ── YouTube ──
function loadYoutube(wrap, vid) {
  wrap.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" 
    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:10px"></iframe>`;
}

// ── Share ──
function shareCar() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: location.href }).catch(()=>{});
  } else {
    copyLink();
  }
}
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.querySelector('.share-btn:last-child');
    if (btn) { const orig=btn.textContent; btn.textContent='הועתק!'; setTimeout(()=>btn.textContent=orig,2000); }
  }).catch(()=>{});
}
