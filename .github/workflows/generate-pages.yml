name: Generate Static Article Pages

on:
  repository_dispatch:
    types: [article-changed]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      articleId:
        description: 'מזהה כתבה ספציפית לרינדור מוקד (השאר ריק לרינדור מלא)'
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: generate-static-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run static generator script
        env:
          SUPABASE_URL: 'https://kaykrrnmykqrfhawgtqt.supabase.co'
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET_ARTICLE_ID: ${{ github.event.client_payload.articleId || github.event.inputs.articleId }}
        run: npm run generate

      - name: Commit and push with retry on conflict
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article/* sitemap.xml index.html 404.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "🤖 אוטומציה: רענון דפים סטטיים ומפת אתר [skip ci]"

          # מנגנון retry: אם push נכשל בגלל מירוץ עם ריצה מקבילה,
          # מנסים rebase מחדש על המצב העדכני ולדחוף שוב, עד 5 פעמים.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️ Push failed (attempt $i) — fetching and rebasing onto latest origin..."
            git fetch origin ${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }}
            sleep $((i * 3))
          done
          echo "❌ Push failed after 5 attempts."
          exit 1
