<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספידומטר - פאנל ניהול תוכן</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="family">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #ff0033;
            --primary-hover: #cc0029;
            --dark: #0f1015;
            --dark-card: #161822;
            --dark-input: #1e2130;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d3142;
            --success: #10b981;
            --font: 'Rubik', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Login Screen Styles */
        .login-container {
            background-color: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            transition: all 0.3s ease;
        }

        .logo-area {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .logo-area span {
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            background-color: var(--dark-input);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 14px 44px 14px 16px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 0, 51, 0.15);
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Dashboard Styles (Hidden by default) */
        .dashboard-container {
            display: none;
            width: 100%;
            max-width: 1200px;
            background-color: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            min-height: 80vh;
        }

        .dash-header {
            background-color: rgba(22, 24, 34, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dash-logo {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .dash-logo span {
            color: var(--primary);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background-color: var(--border);
            color: white;
        }

        .dash-content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 968px) {
            .dash-content {
                grid-template-columns: 1fr;
            }
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .panel-title i {
            color: var(--primary);
        }

        /* Form Controls inside Dashboard */
        .dash-form .input-group input, 
        .dash-form .input-group textarea,
        .dash-form .input-group select {
            width: 100%;
            background-color: var(--dark-input);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .dash-form .input-group input:focus, 
        .dash-form .input-group textarea:focus,
        .dash-form .input-group select:focus {
            border-color: var(--primary);
        }

        .dash-form .input-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: var(--font);
        }

        /* Articles List Panel */
        .articles-list-wrapper {
            background-color: rgba(15, 16, 21, 0.4);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .article-card {
            background-color: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .article-card:hover {
            transform: translateX(-4px);
            border-color: rgba(255, 0, 51, 0.3);
        }

        .article-info h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .article-info span {
            font-size: 0.8rem;
            color: var(--text-muted);
            background-color: var(--dark-input);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .article-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            color: white;
            background-color: var(--border);
        }

        .btn-icon.delete:hover {
            background-color: rgba(255, 0, 51, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background-color: var(--dark-card);
            border-left: 4px solid var(--primary);
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.show {
            bottom: 20px;
        }

        /* Spinner */
        .spinner {
            animation: rotate 1s linear infinite;
            display: none;
        }

        @keyframes rotate {
            100% { transform: rotate(30deg); }
        }

        .image-preview {
            width: 100%;
            height: 150px;
            background-color: var(--dark-input);
            border: 1.5px dashed var(--border);
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-message">הודעה מערכת</span>
    </div>

    <div id="login-panel" class="login-container">
        <div class="logo-area">ספידומטר<span>.</span></div>
        <div class="subtitle">מערכת ניהול תוכן ואתר חדשות</div>
        
        <div class="input-group">
            <label for="admin-pwd-input">סיסמת מנהל מערכת</label>
            <div class="input-wrapper">
                <input type="password" id="admin-pwd-input" placeholder="הכנס סיסמה לחשיפת הפאנל..." autocomplete="off" onkeydown="if(event.key==='Enter')checkAdminPwd()">
                <i class="fa-solid fa-lock"></i>
            </div>
        </div>

        <button class="btn" onclick="checkAdminPwd()">
            <span>התחבר למערכת</span>
            <i class="fa-solid fa-arrow-left"></i>
        </button>
    </div>

    <div id="dashboard-panel" class="dashboard-container">
        <div class="dash-header">
            <div class="dash-logo">ספידומטר<span>.</span> פאנל ניהול</div>
            <div class="user-actions">
                <button class="btn-outline" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> התנתק</button>
            </div>
        </div>

        <div class="dash-content">
            <div class="dash-form">
                <div class="panel-title">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span id="form-action-title">יצירת כתבה חדשה</span>
                </div>

                <input type="hidden" id="edit-id" value="">

                <div class="input-group">
                    <label>כותרת הכתבה</label>
                    <input type="text" id="post-title" placeholder="לדוגמה: אאודי משיקה את ה-RS6 החשמלית החדשה">
                </div>

                <div class="input-group">
                    <label>תת כותרת / תיאור קצר</label>
                    <textarea id="post-subtitle" placeholder="תיאור קצר שיקרא למשתמש להיכנס לכתבה..."></textarea>
                </div>

                <div class="input-group">
                    <label>קטגוריה</label>
                    <select id="post-category">
                        <option value="חדשות">חדשות רכב</option>
                        <option value="מבחני דרכים">מבחני דרכים</option>
                        <option value="רכב חשמלי">רכב חשמלי</option>
                        <option value="מגזין ודעות">מגזין ודעות</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>קישור לתמונה (URL)</label>
                    <input type="text" id="post-image" placeholder="הדבק קישור לתמונה רשת או Unsplash..." oninput="updateImagePreview(this.value)">
                    <div id="image-preview" class="image-preview">תצוגה מקדימה של התמונה</div>
                </div>

                <div class="input-group">
                    <label>תוכן הכתבה המלא (תומך ב-HTML פשוט)</label>
                    <textarea id="post-content" style="min-height: 200px;" placeholder="כתוב כאן את כל הכתבה המלאה שלך..."></textarea>
                </div>

                <button class="btn" id="submit-btn" onclick="savePost()">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span id="submit-btn-text">פרסם כתבה באתר</span>
                </button>
            </div>

            <div class="dash-list">
                <div class="panel-title">
                    <i class="fa-solid fa-list"></i>
                    <span>כתבות קיימות באתר</span>
                </div>
                
                <div class="articles-list-wrapper" id="articles-list">
                    <div style="text-align:center; color:var(--text-muted); padding:40px;">טוען כתבות משרת המידע...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // חיבור ישיר ומאובטח ל-Supabase עבור GitHub Pages
        const SUPABASE_URL = 'https://kaykrrnmykqrfhawgtqt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtheWtycm5teWtxcmZoYXdndHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMzQ2NjUsImV4cCI6MjA5NDYxMDY2NX0.F24w8eKDj4Q0i5Wm7hHtXW72xFJVgLNQvE5qhaRxnWM';
        
        let supabaseClient = null;

        // אתחול קליינט רק אם המפתחות תקינים
        if(SUPABASE_URL && SUPABASE_ANON_KEY) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error("שגיאה: מפתחות החיבור ל-Supabase חסרים!");
        }

        // בדיקת אבטחה כניסה מקומית לפאנל
        function checkAdminPwd() {
            const pwd = document.getElementById('admin-pwd-input').value;
            if(pwd === 'speed1010') {
                showToast('התחברת בהצלחה!', 'success');
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('dashboard-panel').style.display = 'block';
                loadPosts();
            } else {
                showToast('סיסמה שגויה, גישה נדחתה!', 'error');
            }
        }

        function logout() {
            document.getElementById('admin-pwd-input').value = '';
            document.getElementById('dashboard-panel').style.display = 'none';
            document.getElementById('login-panel').style.display = 'block';
        }

        // פונקציית תצוגה מקדימה לתמונה
        function updateImagePreview(url) {
            const preview = document.getElementById('image-preview');
            if(url && url.startsWith('http')) {
                preview.style.backgroundImage = `url('${url}')`;
                preview.textContent = '';
            } else {
                preview.style.backgroundImage = 'none';
                preview.textContent = 'תצוגה מקדימה של התמונה';
            }
        }

        // טעינת רשימת הכתבות
        async function loadPosts() {
            if(!supabaseClient) return;
            const container = document.getElementById('articles-list');
            
            try {
                const { data, error } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if(error) throw error;

                if(!data || data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:40px;">לא נמצאו עדיין כתבות במערכת.</div>';
                    return;
                }

                container.innerHTML = data.map(post => `
                    <div class="article-card">
                        <div class="article-info">
                            <h4>${escapeHtml(post.title)}</h4>
                            <span>${post.category || 'כללי'}</span>
                        </div>
                        <div class="article-actions">
                            <button class="btn-icon" onclick="editPost('${post.id}')" title="ערוך כתבה"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-icon delete" onclick="deletePost('${post.id}')" title="מחק כתבה"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');

            } catch(err) {
                console.error(err);
                container.innerHTML = '<div style="text-align:center; color:#ff0033; padding:40px;">שגיאה בטעינת הנתונים מ-Supabase.</div>';
            }
        }

        // שמירה או עדכון כתבה
        async function savePost() {
            if(!supabaseClient) return;

            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('post-title').value.trim();
            const subtitle = document.getElementById('post-subtitle').value.trim();
            const category = document.getElementById('post-category').value;
            const image = document.getElementById('post-image').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if(!title || !content) {
                showToast('חובה למלא כותרת ותוכן מלא לכתבה!', 'error');
                return;
            }

            const postData = { title, subtitle, category, image, content };

            try {
                if(id) {
                    // Update
                    const { error } = await supabaseClient.from('posts').update(postData).eq('id', id);
                    if(error) throw error;
                    showToast('הכתבה עודכנה בהצלחה באתר!', 'success');
                } else {
                    // Insert
                    const { error } = await supabaseClient.from('posts').insert([postData]);
                    if(error) throw error;
                    showToast('הכתבה פורסמה בהצלחה באתר!', 'success');
                }

                resetForm();
                loadPosts();
            } catch(err) {
                console.error(err);
                showToast('שגיאה בשמירת הכתבה בבסיס הנתונים.', 'error');
            }
        }

        // טעינת נתוני כתבה לתוך הטופס לצורך עריכה
        async function editPost(id) {
            try {
                const { data, error } = await supabaseClient.from('posts').select('*').eq('id', id).single();
                if(error) throw error;

                document.getElementById('edit-id').value = data.id;
                document.getElementById('post-title').value = data.title;
                document.getElementById('post-subtitle').value = data.subtitle || '';
                document.getElementById('post-category').value = data.category || 'חדשות';
                document.getElementById('post-image').value = data.image || '';
                document.getElementById('post-content').value = data.content;

                updateImagePreview(data.image);

                document.getElementById('form-action-title').textContent = 'עריכת כתבה קיימת';
                document.getElementById('submit-btn-text').textContent = 'שמור שינויים בכתבה';
                showToast('נתוני הכתבה נטענו לעריכה', 'success');
            } catch(err) {
                console.error(err);
                showToast('שגיאה במשיכת נתוני הכתבה המבוקשת.', 'error');
            }
        }

        // מחיקת כתבה
        async function deletePost(id) {
            if(!confirm('האם אתה בטוח שברצונך למחוק לצמיתות כתבה זו מהאתר?')) return;

            try {
                const { error } = await supabaseClient.from('posts').delete().eq('id', id);
                if(error) throw error;

                showToast('הכתבה נמחקה בהצלחה מהשרת', 'success');
                if(document.getElementById('edit-id').value === id) {
                    resetForm();
                }
                loadPosts();
            } catch(err) {
                console.error(err);
                showToast('שגיאה בביצוע המחיקה מול השרת.', 'error');
            }
        }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-subtitle').value = '';
            document.getElementById('post-image').value = '';
            document.getElementById('post-content').value = '';
            updateImagePreview('');
            document.getElementById('form-action-title').textContent = 'יצירת כתבה חדשה';
            document.getElementById('submit-btn-text').textContent = 'פרסם כתבה באתר';
        }

        // הלפר קטן למניעת הזרקות קוד ברשימה
        function escapeHtml(text) {
            if(!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // מערכת נוטיפיקציות צפות
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            const text = document.getElementById('toast-message');

            text.textContent = msg;
            toast.className = 'toast'; // reset
            
            if(type === 'success') {
                toast.classList.add('success');
                icon.className = 'fa-solid fa-circle-check';
            } else if(type === 'error') {
                toast.classList.add('error');
                icon.className = 'fa-solid fa-circle-exclamation';
                toast.style.borderLeftColor = 'var(--primary)';
                icon.style.color = 'var(--primary)';
            } else {
                icon.className = 'fa-solid fa-circle-info';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }
    </script>
</body>
</html>
