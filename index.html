<style>
  :root {
    --bg-main: #0b0c10;
    --bg-card: #14161d;
    --bg-card-hover: #1c1f2a;
    --primary: #ff1e42;
    --primary-glow: rgba(255, 30, 66, 0.2);
    --text-white: #ffffff;
    --text-gray: #9ca3af;
    --text-muted: #6b7280;
    --border-color: rgba(255, 255, 255, 0.05);
    --border-hover: rgba(255, 30, 66, 0.3);
    --nav-height: 70px;
    --accent-blue: #00d2ff;
    --accent-green: #00ff87;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background-color: var(--bg-main);
    color: var(--text-white);
    padding-top: var(--nav-height);
    padding-bottom: 60px;
    overflow-x: hidden;
  }
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: rgba(11, 12, 16, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
  }
  .nav-logo {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--text-white);
    text-decoration: none;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }
  .nav-logo span { color: var(--primary); }
  .nav-links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  .nav-link {
    color: var(--text-gray);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
  }
  .nav-link:hover, .nav-link.active {
    color: var(--text-white);
    background: rgba(255, 255, 255, 0.03);
  }
  .nav-link.active {
    border-bottom: 2px solid var(--primary);
    border-radius: 6px 6px 0 0;
  }
  .nav-consult {
    background: var(--primary);
    color: var(--text-white);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px var(--primary-glow);
    text-decoration: none;
  }
  .nav-consult:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(255, 30, 66, 0.4);
  }
  .main-container {
    max-width: 1300px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .hero-main {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16/9;
    cursor: pointer;
    border: 1px solid var(--border-color);
  }
  .hero-main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .hero-main:hover img { transform: scale(1.02); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(11, 12, 16, 0.95) 0%, rgba(11, 12, 16, 0.4) 50%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2rem;
  }
  .badge {
    align-self: flex-start;
    background: var(--primary);
    color: var(--text-white);
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hero-main h1 {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }
  .hero-main p {
    color: var(--text-gray);
    font-size: 1rem;
    line-height: 1.4;
    max-width: 90%;
  }
  .hero-side-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .side-item {
    display: flex;
    gap: 1rem;
    background: var(--bg-card);
    padding: 0.8rem;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid var(--border-color);
    transition: all 0.2s ease;
    align-items: center;
  }
  .side-item:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
  }
  .side-item img {
    width: 100px;
    height: 75px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .side-item-content {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .side-item h3 {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    border-right: 4px solid var(--primary);
    padding-right: 0.8rem;
  }
  .section-header h2 {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
  }
  .news-card {
    background: var(--bg-card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
  }
  .news-card:hover {
    transform: translateY(-2px);
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
  }
  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
    background: #1a1a1a;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .news-card:hover .card-img-wrap img { transform: scale(1.02); }
  .card-content {
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }
  .card-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }
  .card-content p {
    color: var(--text-gray);
    font-size: 0.88rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    margin-top: auto;
    padding-top: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
  .article-view {
    display: none;
    max-width: 800px;
    margin: 2rem auto;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid var(--border-color);
  }
  .back-btn {
    background: rgba(255,255,255,0.05);
    color: var(--text-white);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .article-view h1 {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  .article-meta {
    color: var(--text-gray);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 1rem;
  }
  .article-main-img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 2rem;
  }
  .article-body {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #e5e7eb;
  }
  .article-body p { margin-bottom: 1.2rem; }
  .bottom-nav { display: none; }
  .mobile-header-logo { display: none; }
  @media (max-width: 768px) {
    body {
      padding-top: 60px;
      padding-bottom: 75px;
    }
    .navbar { display: none; }
    .mobile-header-logo {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(11, 12, 16, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 900;
    }
    .mobile-header-logo span { color: var(--primary); }
    .main-container { margin: 1rem auto; padding: 0 1rem; }
    .hero-grid { grid-template-columns: 1fr; gap: 1rem; }
    .hero-main h1 { font-size: 1.4rem; }
    .hero-main p { font-size: 0.88rem; }
    .hero-overlay { padding: 1rem; }
    .side-item img { width: 80px; height: 60px; }
    .side-item h3 { font-size: 0.85rem; }
    .news-grid { grid-template-columns: 1fr; gap: 1rem; }
    .section-header h2 { font-size: 1.2rem; }
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(20, 22, 29, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-color);
      z-index: 1000;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-nav-item {
      background: none;
      border: none;
      color: var(--text-gray);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      flex: 1;
    }
    .bottom-nav-item svg { width: 20px; height: 20px; }
    .bottom-nav-item.active { color: var(--primary); }
    .article-view { padding: 1rem; margin: 1rem auto; border: none; }
    .article-view h1 { font-size: 1.6rem; }
    .article-body { font-size: 1rem; }
  }
  .loading-shimmer {
    background: linear-gradient(90deg, #14161d 25%, #1c1f2a 50%, #14161d 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

  <div class="mobile-header-logo">ספידומטר<span>.</span></div>

  <nav class="navbar">
    <a href="#" class="nav-logo" onclick="showMainPage()">ספידומטר<span>.</span></a>
    <div class="nav-links">
      <a href="#" class="nav-link active" onclick="filterCat('all');setNav(this)">ראשי</a>
      <a href="#" class="nav-link" onclick="filterCat('news');setNav(this)">חדשות</a>
      <a href="#" class="nav-link" onclick="filterCat('review');setNav(this)">מבחני דרכים</a>
      <a href="#" class="nav-link" onclick="filterCat('luxury');setNav(this)">רכבי יוקרה</a>
      <a href="#" class="nav-link" onclick="filterCat('ev');setNav(this)">חשמלי</a>
    </div>
    <a href="https://wa.me/972500000000" target="_blank" class="nav-consult">ייעוץ אישי בוואטסאפ</a>
  </nav>

  <div class="main-container" id="main-page-content">
    <div class="hero-grid" id="hero-section">
      <div class="hero-main loading-shimmer" style="aspect-ratio:16/9;"></div>
      <div class="hero-side-list">
        <div class="side-item loading-shimmer" style="height:80px;"></div>
        <div class="side-item loading-shimmer" style="height:80px;"></div>
        <div class="side-item loading-shimmer" style="height:80px;"></div>
      </div>
    </div>

    <div class="section-header">
      <h2 id="feed-title">כל הכתבות והעדכונים</h2>
    </div>
    <div class="news-grid" id="posts-grid"></div>
  </div>

  <div class="article-view" id="article-page-content"></div>

  <nav class="bottom-nav">
    <button class="bottom-nav-item active" onclick="filterCat('all');setBottomNav(this)" aria-label="בית">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>בית</span>
    </button>
    <button class="bottom-nav-item" onclick="filterCat('review');setBottomNav(this)" aria-label="מבחנים">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>מבחנים</span>
    </button>
    <button class="bottom-nav-item" onclick="filterCat('luxury');setBottomNav(this)" aria-label="יוקרה">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>יוקרה</span>
    </button>
    <button class="bottom-nav-item" onclick="filterCat('ev');setBottomNav(this)" aria-label="חשמלי">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span>חשמלי</span>
    </button>
  </nav>

  <script>
    // הגדרה קבועה וישירה של הקישור והמפתח של ה-Supabase שלך לסנכרון מלא בדומיין ובמובייל
    const _SB_URL = 'https://kaykrrnmykqrfhawgtqt.supabase.co';
    const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtheWtycm5teWtxcmZoYXdndHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMzQ2NjUsImV4cCI6MjA5NDYxMDY2NX0.F24w8eKDj4Q0i5Wm7hHtXW72xFJVgLNQvE5qhaRxnWM';
    
    const client = supabase.createClient(_SB_URL, _SB_KEY);
    let allPosts = [];
    let currentCategory = 'all';

    const catMap = { 'news': 'חדשות', 'review': 'מבחני דרכים', 'luxury': 'רכב יוקרה', 'ev': 'רכב חשמלי' };

    window.addEventListener('DOMContentLoaded', async () => {
      await fetchBlogPosts();
    });

    async function fetchBlogPosts() {
      try {
        const { data, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        allPosts = data || [];
        renderDashboard();
      } catch (e) {
        console.error("Error loading posts:", e);
        document.getElementById('posts-grid').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-gray);">שגיאה בטעינת הכתבות. אנא רענן את העמוד.</p>';
      }
    }

    function renderDashboard() {
      const filtered = currentCategory === 'all' ? allPosts : allPosts.filter(p => p.category === catMap[currentCategory] || p.category === currentCategory);
      const grid = document.getElementById('posts-grid');
      const heroSection = document.getElementById('hero-section');
      
      if (!filtered || filtered.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-gray);padding:3rem 0;">אין עדיין כתבות בקטגוריה זו.</p>';
        if(currentCategory === 'all') heroSection.style.display = 'none';
        return;
      }

      if (currentCategory === 'all' && filtered.length >= 1) {
        heroSection.style.display = 'grid';
        const main = filtered[0];
        const sideItems = filtered.slice(1, 4);

        heroSection.innerHTML = `
          <div class="hero-main" onclick="openArticle('${main.id}')">
            <img src="${main.image || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800'}" alt="${escapeHtml(main.title)}">
            <div class="hero-overlay">
              <span class="badge">${main.category || 'ראשי'}</span>
              <h1>${escapeHtml(main.title)}</h1>
              <p>${escapeHtml(main.subtitle || '')}</p>
            </div>
          </div>
          <div class="hero-side-list">
            ${sideItems.map(item => `
              <div class="side-item" onclick="openArticle('${item.id}')">
                <img src="${item.image || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=300'}" alt="${escapeHtml(item.title)}">
                <div class="side-item-content">
                  <span class="badge" style="padding:0.1rem 0.4rem;font-size:0.65rem;margin:0;">${item.category || 'רכב'}</span>
                  <h3>${escapeHtml(item.title)}</h3>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        heroSection.style.display = 'none';
      }

      const displayList = (currentCategory === 'all' && filtered.length > 4) ? filtered.slice(4) : filtered;
      
      grid.innerHTML = displayList.map(post => `
        <div class="news-card" onclick="openArticle('${post.id}')">
          <div class="card-img-wrap">
            <img src="${post.image || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500'}" alt="${escapeHtml(post.title)}" loading="lazy">
          </div>
          <div class="card-content">
            <span class="badge" style="margin-bottom:0.5rem;">${post.category || 'כללי'}</span>
            <h3>${escapeHtml(post.title)}</h3>
            <p>${escapeHtml(post.subtitle || '')}</p>
            <div class="card-footer">
              <span>ספידומטר</span>
              <span>${new Date(post.created_at).toLocaleDateString('he-IL')}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openArticle(id) {
      const post = allPosts.find(p => p.id === id || String(p.id) === String(id));
      if (!post) return;

      const view = document.getElementById('article-page-content');
      document.getElementById('main-page-content').style.display = 'none';
      view.style.display = 'block';
      window.scrollTo(0, 0);

      view.innerHTML = `
        <button class="back-btn" onclick="showMainPage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:scaleX(-1);"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          חזרה לכתבות
        </button>
        <span class="badge">${post.category || 'רכב'}</span>
        <h1>${escapeHtml(post.title)}</h1>
        <div class="article-meta">
          <span>פורסם בתאריך: ${new Date(post.created_at).toLocaleDateString('he-IL')}</span>
          <span>·</span>
          <span>מערכת ספידומטר</span>
        </div>
        ${post.image ? `<img class="article-main-img" src="${post.image}" alt="${escapeHtml(post.title)}">` : ''}
        <div class="article-body">${post.content}</div>
      `;
    }

    function showMainPage() {
      document.getElementById('article-page-content').style.display = 'none';
      document.getElementById('main-page-content').style.display = 'block';
      window.scrollTo(0, 0);
    }

    function filterCat(cat) {
      currentCategory = cat;
      const titles = { 'all': 'כל הכתבות והעדכונים', 'news': 'חדשות הרכב', 'review': 'מבחני דרכים', 'luxury': 'רכבי יוקרה', 'ev': 'רכב חשמלי חשמליות' };
      document.getElementById('feed-title').textContent = titles[cat] || 'כתבות';
      showMainPage();
      renderDashboard();
    }

    function setNav(el) {
      document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
    }

    function setBottomNav(el) {
      document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
